<div class="modal-overlay" id="modal-vizualizare">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">Adaugă vizualizare</div>
            <button class="icon-btn" onclick="closeModal('modal-vizualizare')">
                <i class="ti ti-x"></i>
            </button>
        </div>

        <div class="modal-body">
            <form id="vizualizare-form">
                <div class="form-group">
                    <label class="form-label">Film</label>
                    <select class="form-input" id="viz-id-film" required>
                        <option value="">Se încarcă filmele disponibile...</option>
                    </select>
                    <div style="font-size:12px;color:var(--text3);margin-top:6px">
                        Poți înregistra același film de mai multe ori.
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Versiune</label>
                    <select class="form-input" id="viz-id-versiune">
                        <option value="">Alege mai întâi filmul</option>
                    </select>
                    <div style="font-size:12px;color:var(--text3);margin-top:6px">
                        Versiunile sunt încărcate automat pentru filmul selectat.
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Vot</label>
                    <input class="form-input" id="viz-vot" type="number" min="1" max="10" placeholder="Ex: 9">
                </div>

                <button class="btn btn-primary" type="submit">
                    <i class="ti ti-player-play"></i>
                    Salvează vizualizarea
                </button>
            </form>
        </div>
    </div>
</div>
