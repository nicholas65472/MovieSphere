<div class="modal-overlay" id="modal-comentariu">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="comentariu-title">Comentariu film</div>
            <button class="icon-btn" onclick="closeModal('modal-comentariu')">
                <i class="ti ti-x"></i>
            </button>
        </div>

        <div class="modal-body">
            <form id="comentariu-form">
                <input type="hidden" id="comentariu-id-film">

                <div class="form-group">
                    <label class="form-label">Comentariu</label>
                    <textarea class="form-input" id="comentariu-continut" required placeholder="Scrie comentariul..."></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Opțiuni</label>
                    <div class="options-grid" id="comentariu-optiuni"></div>
                </div>

                <button class="btn btn-primary" type="submit">
                    <i class="ti ti-message-plus"></i>
                    Trimite comentariu
                </button>
            </form>
        </div>
    </div>
</div>
